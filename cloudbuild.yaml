steps:
  # Build the Docker image using the Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag=europe-west1-docker.pkg.dev/gen-lang-client-0546131836/cloud-run-source-deploy/officialwebsite/officialwebsite:$COMMIT_SHA'
      - '--tag=europe-west1-docker.pkg.dev/gen-lang-client-0546131836/cloud-run-source-deploy/officialwebsite/officialwebsite:latest'
      - '--cache-from=europe-west1-docker.pkg.dev/gen-lang-client-0546131836/cloud-run-source-deploy/officialwebsite/officialwebsite:latest'
      - '.'

  # Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'europe-west1-docker.pkg.dev/gen-lang-client-0546131836/cloud-run-source-deploy/officialwebsite/officialwebsite'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'officialwebsite'
      - '--image=europe-west1-docker.pkg.dev/gen-lang-client-0546131836/cloud-run-source-deploy/officialwebsite/officialwebsite:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'

images:
  - 'europe-west1-docker.pkg.dev/gen-lang-client-0546131836/cloud-run-source-deploy/officialwebsite/officialwebsite:$COMMIT_SHA'
  - 'europe-west1-docker.pkg.dev/gen-lang-client-0546131836/cloud-run-source-deploy/officialwebsite/officialwebsite:latest'

options:
  logging: CLOUD_LOGGING_ONLY
