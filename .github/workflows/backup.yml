name: Automated Google Drive Backup

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  repository_dispatch:
    types: [trigger-backup] # Allows triggering from Next.js API
  workflow_dispatch:
    inputs:
      type:
        description: 'Backup Type (full, db-only, code-only)'
        required: true
        default: 'full'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Setup PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-common postgresql-client

      - name: Run Backup Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BACKUP_TYPE: ${{ github.event.client_payload.type || github.event.inputs.type || 'full' }}
          NODE_ENV: production
        run: |
          # Run Vercel Blob backup script
          node scripts/backup-blob.mjs $BACKUP_TYPE
